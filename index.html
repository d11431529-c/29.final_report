<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICartoSplitter 入口網頁</title>
    <!-- 引入 Google Fonts 提升字體質感 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基礎樣式重設 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 科技感背景裝飾 */
        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(18, 24, 38, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 24, 38, 0.5) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: 1;
        }

        /* 柔和發光背景效果 */
        .glow-effect {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
            filter: blur(40px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* 主要卡片容器 */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 600px;
            width: 90%;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 標誌 / LOGO 裝飾 */
        .logo-mark {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            position: relative;
        }

        /* SVG 圖標：表現分解與地圖的概念 */
        .logo-mark svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 標題與下標題樣式 */
        .brand-title {
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ffffff 50%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 1.2rem;
            color: #9ca3af;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 3.5rem;
            text-transform: uppercase;
        }

        /* 進入按鈕設計 */
        .enter-btn {
            position: relative;
            display: inline-block;
            padding: 1.2rem 3.5rem;
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            overflow: hidden;
            letter-spacing: 2px;
        }

        /* 按鈕滑過效果 */
        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }

        .enter-btn:active {
            transform: translateY(-1px);
        }

        /* 按鈕內部光效 */
        .enter-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            transition: 0.75s;
            opacity: 0;
        }

        .enter-btn:hover::after {
            left: 125%;
            opacity: 1;
            transition: left 0.7s ease-in-out;
        }

        /* 底部裝飾與頁尾 */
        .footer {
            margin-top: 3.5rem;
            font-size: 0.8rem;
            color: #4b5563;
            letter-spacing: 1px;
        }

        /* 點擊按鈕時的頁面淡出效果 */
        .fade-out {
            animation: fadeOut 0.6s forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }

        /* 手機版響應式微調 */
        @media (max-width: 480px) {
            .brand-title {
                font-size: 2rem;
            }
            .sub-title {
                font-size: 1rem;
                letter-spacing: 2px;
                margin-bottom: 2.5rem;
            }
            .container {
                padding: 2.5rem 1.5rem;
            }
            .enter-btn {
                padding: 1rem 2.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- 網格背景 -->
    <div class="background-grid"></div>
    <!-- 圓形發光背景 -->
    <div class="glow-effect"></div>

    <!-- 主要入口卡片 -->
    <div class="container" id="mainContainer">
        
        <!-- LOGO 區塊 -->
        <div class="logo-mark">
            <!-- SVG 展示地圖分層與拆解的意象 -->
            <svg viewBox="0 0 24 24">
                <!-- 地圖摺疊層次線條 -->
                <path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z" />
                <path d="M9 3v15M15 6v15" />
                <!-- 科技分割十字線 (象徵 Splitter) -->
                <circle cx="12" cy="12" r="3" stroke="#ffd700" stroke-width="1.5" fill="rgba(255,215,0,0.2)" />
            </svg>
        </div>

        <!-- 標題 -->
        <h1 class="brand-title">AICartoSplitter</h1>
        
        <!-- 下標題 -->
        <p class="sub-title">智慧地圖分解與色彩輔助系統</p>

        <!-- 進入按鈕 -->
        <a href="https://example.com/AICartoSplitter" class="enter-btn" id="enterBtn">
            進入系統
        </a>

        <!-- 頁尾 -->
        <div class="footer">
            &copy; 2026 AICartoSplitter. All Rights Reserved.
        </div>
    </div>

    <script>
        document.getElementById('enterBtn').addEventListener('click', function(e) {
            // 如果需要展示轉場動畫，可以先阻止預設行為，動畫播完後再跳轉
            e.preventDefault();
            const targetUrl = this.getAttribute('href');
            const container = document.getElementById('mainContainer');
            
            // 加入淡出效果
            container.classList.add('fade-out');
            
            // 動畫結束後導向目標網頁
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 600); // 這裡配合 CSS 中的動畫時間 0.6s
        });
    </script>
</body>
</html>
